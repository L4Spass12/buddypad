name: Translate Content (FR → EN/DE)

# Lancement manuel uniquement (workflow_dispatch). Coût Claude réel,
# donc pas de cron. L'utilisateur déclenche depuis l'onglet Actions.
on:
  workflow_dispatch:
    inputs:
      langs:
        description: 'Langues cibles (ex: en,de — laisser vide = en + de)'
        required: false
        default: 'en,de'
      collections:
        description: 'Collections (ex: blog,products,productCategories — vide = toutes)'
        required: false
        default: 'blog,products,productCategories'
      force:
        description: 'Regénérer même les fichiers déjà traduits ?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Empêche un translate + un deploy de se chevaucher sur l'FTP.
concurrency:
  group: hostinger-ftp
  cancel-in-progress: false

jobs:
  translate-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run translation batch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS="--langs ${{ github.event.inputs.langs }} --collections ${{ github.event.inputs.collections }}"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          echo "Running: node scripts/translate-all.mjs $ARGS"
          node scripts/translate-all.mjs $ARGS

      - name: Detect changes
        id: changes
        run: |
          git add src/content/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Aucune nouvelle traduction."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "$(git diff --staged --name-only | wc -l) fichier(s) traduit(s)."
          fi

      - name: Commit translated files
        if: steps.changes.outputs.changed == 'true'
        run: |
          SITE_NAME=$(node -e "import('./site.config.mjs').then(m=>process.stdout.write(m.default.name))")
          git config user.name "${SITE_NAME} Translation Bot"
          git config user.email "translate-bot@${GITHUB_REPOSITORY#*/}.com"
          git commit -m "i18n: batch translate (${{ github.event.inputs.langs }}) - ${{ github.event.inputs.collections }}"
          git push
